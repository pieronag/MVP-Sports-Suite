name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - "mvp-sports-web/**"
  pull_request:
    branches: [main]
    paths:
      - "mvp-sports-web/**"

defaults:
  run:
    working-directory: mvp-sports-web

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: mvp-sports-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
