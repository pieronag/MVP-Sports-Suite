name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "mvp-sports-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "mvp-sports-backend/**"

defaults:
  run:
    working-directory: mvp-sports-backend/functions

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: mvp-sports-backend/functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
